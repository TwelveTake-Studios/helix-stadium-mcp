name: Publish to PyPI

# Publishes the package to PyPI via Trusted Publishing (OIDC) - no API token is
# stored anywhere. Runs when a GitHub Release is published, and can be dispatched
# manually (used for the first release once the PyPI trusted publisher is configured).
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
